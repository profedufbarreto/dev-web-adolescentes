<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Café Lógico - Contato</title>
</head>
<body>
    <h2>Contato:</h2>

    <form action="">
        <label for="nome">Nome:</label>
        <input type="text" id="nome" name="nome" placeholder="Digite seu nome:">
        <br>

        <label for="email">E-mail:</label>
        <input type="email" id="email" name="email" placeholder="Digite seu e-mail:">
        <br>

        <label for="telefone">Telefone:</label>
        <input type="tel" id="tel" name="telefone" placeholder="Digite seu telefone:">
        <br>

        <label for="produto">Escolha seu produto:</label>
        <select name="produto" id="protudo">
            <option value="Expresso">Expresso</option>
            <option value="Cappuccino">Cappuccino</option>
            <option value="latte">Latte</option>
        </select>
        <br>
        
        <textarea name="msg" id="mensagem">Deixe sua mensagem:</textarea>
    </form>
</body>
</html>
